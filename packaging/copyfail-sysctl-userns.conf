# /etc/sysctl.d/99-copyfail-defense-userns.conf
# Owned by copyfail-defense-sysctl; managed by %posttrans detection.
# Hand-edits ARE preserved (cmp-and-skip per SPEC §12.10.2a / D-57):
# %posttrans detects divergence, logs WARN, and does not overwrite.
# /var/lib/copyfail-defense/auto-detect.json captures the decision
# state separately from this file's on-disk content.
#
# Host-wide block on unprivileged user-namespace creation. The cf2 /
# Dirty Frag-ESP / Fragnesia chains need CLONE_NEWUSER to acquire
# CAP_NET_ADMIN-in-namespace, which gates the xfrm SA install. The
# systemd RestrictNamespaces=~user drop-in only protects units; this
# sysctl closes the same gap host-wide.
#
# Keys are prefixed with '-' so sysctl --system silently skips any key
# the running kernel doesn't recognise (sysctl.d(5)) - the three keys
# below are not all defined on every distro.
#
# Suppressed (file removed) when rootless containers, Flatpak,
# firejail, or a desktop browser is detected. See README "Auto-detect"
# table. operator-applied workarounds:
#
#   /etc/copyfail/force-full   - skip detection entirely
#   per-user: drop a 50-*.conf in /etc/sysctl.d/ with a higher value
#             to override (sysctl.d merges in lexicographic order).

-user.max_user_namespaces                     = 0
-kernel.unprivileged_userns_clone             = 0
-kernel.apparmor_restrict_unprivileged_userns = 1
