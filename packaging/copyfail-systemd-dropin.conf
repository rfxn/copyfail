# /etc/systemd/system/<unit>.service.d/10-copyfail-defense.conf
# Owned by copyfail-defense-systemd; do not hand-edit.
#
# Always-on tenant-unit hardening. The conditional address-family and
# userns cuts live in 12-copyfail-defense-rxrpc-af.conf and
# 15-copyfail-defense-userns.conf respectively (managed by detect.sh).
#
# AF_KEY (PF_KEYv2): legacy IPsec SA-configuration socket. Closes the
# easier of the two SA-config paths used by the Dirty Frag / Fragnesia
# chain (the other is XFRM netlink, which still requires CAP_NET_ADMIN).
# Modern userland uses XFRM netlink; AF_KEY is legacy with negligible
# compatibility risk on the five tenant units.
#
# Override per-host: drop a 20-override.conf with empty values
# to neutralize a directive, or 25-additions.conf to add new ones.
# See README "Manual override (finer than detection)".
[Service]
RestrictAddressFamilies=~AF_ALG ~AF_KEY
SystemCallArchitectures=native
SystemCallFilter=~@swap
