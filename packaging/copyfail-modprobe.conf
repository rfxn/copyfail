# /etc/modprobe.d/99-copyfail-defense.conf
# Owned by copyfail-defense-modprobe; do not hand-edit.
#
# Modprobe blacklist + install-redirect for the kernel modules used by
# the Copy Fail bug-class entry points:
#   - cf1 (CVE-2026-31431) — algif_aead AEAD scratch-write
#   - cf2 ("Electric Boogaloo") — xfrm-ESP skip_cow path
#   - Dirty Frag — xfrm-ESP and RxRPC pcbc(fcrypt) on splice'd frag
#
# WILL BREAK workloads that legitimately use:
#   - IPsec (strongSwan, libreswan, FRRouting esp4/esp6/xfrm_user/xfrm_algo)
#   - AFS (openafs, kafs — rxrpc)
#   - kernel crypto via AF_ALG (some QEMU configs, dm-crypt-via-AF_ALG
#     userspace — algif_aead/af_alg)

# cf1 — CVE-2026-31431 algif_aead family
# (no-op on RHEL where algif_aead is builtin; functional on stock mainline)
install algif_aead   /bin/false
install authenc      /bin/false
install authencesn   /bin/false
install af_alg       /bin/false
blacklist algif_aead
blacklist authenc
blacklist authencesn
blacklist af_alg

# cf2 / Dirty Frag-ESP — xfrm IPsec ESP family
# (modules on stock RHEL 8/9/10 generic kernels — blacklist IS functional)
install esp4         /bin/false
install esp6         /bin/false
install xfrm_user    /bin/false
install xfrm_algo    /bin/false
blacklist esp4
blacklist esp6
blacklist xfrm_user
blacklist xfrm_algo

# Dirty Frag-RxRPC — Andrew File System RPC
# (Ubuntu loads by default; RHEL ships in kernel-modules-extra, not core)
install rxrpc        /bin/false
blacklist rxrpc
