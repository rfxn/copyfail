# /etc/modprobe.d/no-afalg.conf - example modprobe blacklist for the
# AF_ALG family, shipped by the copyfail package.
#
# Defeats the auto-load path for every algif_* module via a non-existent
# install command. Only effective when these modules are NOT already
# resident and NOT statically built into the kernel. See
# /proc/modules and `grep ALG_USERMODE /boot/config-$(uname -r)`.
#
# This file is documentation only - it is NOT installed into
# /etc/modprobe.d by the package. Copy it into place explicitly:
#
#   install -m 0644 /usr/share/doc/copyfail/examples/no-afalg-modprobe.conf \
#       /etc/modprobe.d/99-no-afalg.conf
#   rmmod algif_aead 2>/dev/null || true
#
install af_alg          /bin/false
install algif_aead      /bin/false
install algif_skcipher  /bin/false
install algif_hash      /bin/false
install algif_rng       /bin/false
