# /etc/modprobe.d/no-afalg.conf - modprobe blacklist for AF_ALG and the
# CVE-2026-31431 cipher chain.
#
# This is one of TWO equally low-barrier mitigations that ship with the
# afalg-defense package. The two stack:
#
#   - LD_PRELOAD shim (/usr/lib64/no-afalg.so) blocks every userspace
#     caller at libc, regardless of how the kernel exposed AF_ALG.
#   - This modprobe blacklist removes the kernel attack surface entirely
#     when the modules are loadable. Effective only when these modules
#     are NOT already resident and NOT statically built into the kernel.
#
# Quickly determine which apply on the current host:
#
#   ls /sys/module/algif_aead 2>/dev/null && \
#       echo "module is reachable - blacklist effective" || \
#       echo "module absent - blacklist still useful as defense in depth"
#   grep -E 'ALG_USERMODE|CRYPTO_USER_API' /boot/config-$(uname -r)
#       # =m  -> modular, blacklist is your primary mitigation
#       # =y  -> builtin, the LD_PRELOAD shim is your primary mitigation
#
# Where your kernel allows it, deploy BOTH. They defeat the bug by
# different mechanisms.
#
# This file is documentation only - the package does NOT install it into
# /etc/modprobe.d on its own (deliberate; the operator gets to decide
# when to sever AF_ALG fleet-wide). Copy it into place explicitly:
#
#   sudo install -m 0644 \
#     /usr/share/doc/afalg-defense/examples/no-afalg-modprobe.conf \
#     /etc/modprobe.d/99-no-afalg.conf
#   sudo rmmod algif_aead authenc authencesn 2>/dev/null || true
#
# AF_ALG family - cuts off the userspace crypto socket interface entirely.
install af_alg          /bin/false
install algif_aead      /bin/false
install algif_skcipher  /bin/false
install algif_hash      /bin/false
install algif_rng       /bin/false

# Specific CVE-2026-31431 cipher chain. Blacklisting these severs the
# vulnerable authencesn(hmac(sha256),cbc(aes)) AEAD path even on a host
# where algif_aead is somehow still reachable.
install authenc         /bin/false
install authencesn      /bin/false
