# Example systemd drop-in for any service that should not need AF_ALG.
# Shipped as documentation only - the package does NOT install drop-ins
# into /etc/systemd/system on its own (deliberate; per-service rollout
# decisions belong to the operator).
#
# Recommended high-leverage targets:
#   /etc/systemd/system/sshd.service.d/no-afalg.conf
#   /etc/systemd/system/user@.service.d/no-afalg.conf
#   /etc/systemd/system/<container-runtime>.service.d/no-afalg.conf
#
# After installing a drop-in:
#   systemctl daemon-reload
#   systemctl restart <service>
#
# Pair RestrictAddressFamilies=~AF_ALG with SystemCallArchitectures=native
# so 32-bit compat syscalls cannot bypass the filter.

[Service]
RestrictAddressFamilies=~AF_ALG
SystemCallArchitectures=native
